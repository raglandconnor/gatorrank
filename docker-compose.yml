services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/.venv

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - ./frontend/.env
    environment:
      WATCHPACK_POLLING: "${WATCHPACK_POLLING:-false}"
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USEPOLLING:-false}"
    command: ["bun", "run", "dev"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend

volumes:
  frontend_next:
